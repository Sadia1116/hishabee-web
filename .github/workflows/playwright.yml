name: Playwright CI with Allure

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Checkout gh-pages (for Allure history)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Copy previous Allure history
        run: |
          mkdir -p allure-results/history
          cp -r gh-pages/history/* allure-results/history/ || true

      - name: Generate Allure report
        run: npx allure generate allure-results --clean -o allure-report

      # ✅ THIS WAS MISSING
      - name: Save Allure history
        run: |
          mkdir -p allure-report/history
          cp -r allure-results/history/* allure-report/history/ || true

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
